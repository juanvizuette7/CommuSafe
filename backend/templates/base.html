<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CommuSafe{% endblock title %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#1A1A2E",
                        secondary: "#16213E",
                        accent: "#0F3460",
                        danger: "#E94560",
                        success: "#10B981",
                        surface: "#F8FAFC",
                    },
                    boxShadow: {
                        soft: "0 20px 45px rgba(15, 52, 96, 0.12)",
                    },
                },
            },
        };
    </script>
</head>
<body class="min-h-screen bg-surface text-slate-900">
    {% block content %}{% endblock content %}
</body>
</html>
